name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Type check
        run: pnpm turbo tsc-check

  lint:
    name: Lint
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Lint
        run: pnpm turbo lint

  format:
    name: Format Check
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Check formatting
        run: pnpm turbo format-check

  # apps/www is the largest suite, so it is sharded across parallel runners.
  # vitest --shard splits by test file; globalSetup runs once per shard, and
  # each runner is a separate VM, so every shard gets its own Docker
  # Postgres/Redis (no cross-shard DB contention). Per-shard blob reports are
  # merged in the www-test-report job below.
  www-test:
    name: www tests (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    # Kept at 2vcpu to match the previous single-job per-DB concurrency
    # (forks default to vCPU count, all sharing one Postgres per shard).
    # Bumping vcpus needs per-worker DB isolation first (see Tier 2).
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    steps:
      - uses: actions/checkout@v4
      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Build workspace packages
        # apps/www tests import @terragon/* from dist; build deps explicitly
        # since we invoke vitest directly rather than through `turbo test`.
        run: pnpm turbo build --filter='./packages/*'
      - name: Test shard
        # Integration harness (test/integration/*.test.tsx) replays
        # daemon-event recordings against the real Next.js route handler.
        # Recordings are committed fixtures (no live sandbox required); the DB
        # is spun up by vitest globalSetup.
        run: >-
          pnpm -C apps/www test --
          run --reporter=blob
          --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: www-blob-${{ matrix.shardIndex }}
          path: apps/www/.vitest-reports/*
          include-hidden-files: true
          retention-days: 1

  www-test-report:
    name: Merge www test reports
    if: ${{ !cancelled() }}
    needs: [www-test]
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          path: apps/www/.vitest-reports
          pattern: www-blob-*
          merge-multiple: true
      - name: Merge reports
        run: pnpm -C apps/www exec vitest --merge-reports

  other-tests:
    name: Tests (other packages)
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Tests
        run: pnpm turbo test --filter='!@terragon/www'

  # Single required status check. Gate branch protection on THIS job so the
  # shard count can change without editing required-checks config. A skipped
  # upstream job (e.g. a failed shard short-circuiting a dependent) would
  # otherwise pass a naive `needs` gate, so we fail on failure/cancellation.
  ci-required:
    name: CI required
    if: always()
    needs: [typecheck, lint, format, www-test, other-tests]
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Verify all required jobs succeeded
        run: |
          echo "Job results: ${{ join(needs.*.result, ', ') }}"
          if ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}; then
            echo "::error::A required job did not succeed."
            exit 1
          fi
          echo "All required jobs succeeded."
