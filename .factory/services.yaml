commands:
  install: pnpm install
  typecheck: pnpm tsc-check
  lint: pnpm turbo lint
  test: pnpm -C packages/shared exec vitest run src/delivery-loop/domain/failure-signature.test.ts src/delivery-loop/store/dispatch-intent-store.test.ts && pnpm -C apps/www exec vitest run src/server-lib/delivery-loop/v3/reducer.test.ts src/server-lib/delivery-loop/v3/process-effects.test.ts src/app/api/daemon-event/route.test.ts && pnpm -C apps/www exec vitest run src/server-lib/e2e.test.ts
  delivery_loop_preflight: pnpm delivery-loop:local preflight
  delivery_loop_fast: pnpm delivery-loop:local run --profile fast

services:
  postgres:
    start: ENV=dev POSTGRES_PORT=5432 docker compose --project-name=terragon-db -f packages/dev-env/docker-compose.yml up -d postgres
    stop: ENV=dev POSTGRES_PORT=5432 docker compose --project-name=terragon-db -f packages/dev-env/docker-compose.yml stop postgres
    healthcheck: pg_isready -h localhost -p 5432 -U postgres
    port: 5432
    depends_on: []

  redis:
    start: ENV=dev REDIS_PORT=6379 docker compose --project-name=terragon-db -f packages/dev-env/docker-compose.yml up -d redis
    stop: ENV=dev REDIS_PORT=6379 docker compose --project-name=terragon-db -f packages/dev-env/docker-compose.yml stop redis
    healthcheck: redis-cli -p 6379 ping
    port: 6379
    depends_on: []

  web:
    start: PORT=3100 pnpm -C apps/www dev --port 3100
    stop: lsof -ti tcp:3100 | xargs kill
    healthcheck: curl -sf http://127.0.0.1:3100
    port: 3100
    depends_on: [postgres, redis]
